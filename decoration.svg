<svg viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg" width="800" height="180">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&amp;display=swap');

    @keyframes glitch-flicker {
      0%, 100% { opacity: 0.8; }
      5% { opacity: 1; }
      10% { opacity: 0.3; }
      15% { opacity: 0.9; }
      20% { opacity: 0.5; }
      25% { opacity: 1; }
      80% { opacity: 1; }
      81% { opacity: 0.4; }
      82% { opacity: 1; }
    }

    @keyframes node-pulse {
      0%, 100% { opacity: 1; r: 3; }
      50% { opacity: 0.6; r: 2.5; }
    }

    @keyframes scanline-move {
      0% { transform: translateY(-180px); }
      100% { transform: translateY(180px); }
    }

    @keyframes data-flow {
      0% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -50; }
    }

    .base-font { font-family: 'JetBrains Mono', monospace; font-size: 8px; fill: #4a7a9b; opacity: 0.6; }
    .neon-green { fill: #2a9d5c; animation: glitch-flicker 5s infinite; }
    .neon-cyan { fill: #1a9dbf; animation: glitch-flicker 5s infinite 1s; }
    .muted-blue { fill: #4a7a9b; opacity: 0.5; }
    .connection-green { stroke: #2a9d5c; stroke-width: 0.5; opacity: 0.3; }
    .connection-cyan { stroke: #1a9dbf; stroke-width: 0.8; stroke-dasharray: 4 2; animation: data-flow 10s linear infinite; }
    .pulse-node-green { fill: #2a9d5c; animation: node-pulse 2s infinite; }
    .scan { fill: #2a9d5c; opacity: 0.05; animation: scanline-move 4s linear infinite; }
  </style>

  <rect width="800" height="180" fill="#0a0c0f" rx="6"/>
  <rect class="scan" x="0" y="0" width="800" height="40" rx="3"/>

  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a2332" stroke-width="0.3"/>
    </pattern>
  </defs>
  <rect width="800" height="180" fill="url(#grid)" opacity="0.2"/>

  <g transform="translate(40, 40)">
    <text class="base-font" x="0" y="0">// data.arch // opt.struct</text>
    <rect x="0" y="10" width="100" height="100" fill="none" stroke="#1a2332" stroke-width="1" rx="4"/>
    <circle class="muted-blue" cx="20" cy="30" r="1.5"/>
    <circle class="muted-blue" cx="20" cy="50" r="1.5"/>
    <circle class="muted-blue" cx="20" cy="70" r="1.5"/>
    <circle class="pulse-node-green" cx="50" cy="30" r="3"/>
    <circle class="neon-cyan" cx="80" cy="30" r="2"/>
    <line class="connection-green" x1="20" y1="30" x2="50" y2="30"/>
    <line class="connection-cyan" x1="50" y1="30" x2="80" y2="30"/>
    <line class="connection-muted" x1="20" y1="30" x2="20" y2="70" stroke="#1a2332" stroke-width="0.5"/>
    <text class="base-font" x="110" y="33" style="font-size: 7px;">0xDEADBEEF :: active_m</text>
    <text class="base-font" x="110" y="48" style="font-size: 7px;">0x00FF0000 :: struct_p</text>
  </g>

  <g transform="translate(300, 20)">
    <text class="base-font" x="0" y="10">// sys.log // path.optim</text>
    <line x1="0" y1="15" x2="300" y2="15" stroke="#1a2332" stroke-width="0.5"/>
    <circle class="neon-green" cx="50" cy="50" r="5" opacity="0.8"/>
    <circle class="neon-cyan" cx="150" cy="50" r="5" opacity="0.8"/>
    <circle class="neon-green" cx="250" cy="50" r="5" opacity="0.8"/>
    <circle class="neon-cyan" cx="100" cy="110" r="4" opacity="0.7"/>
    <circle class="neon-green" cx="200" cy="110" r="4" opacity="0.7"/>
    <line class="connection-green" x1="50" y1="50" x2="150" y2="50" stroke-width="1"/>
    <line class="connection-cyan" x1="150" y1="50" x2="250" y2="50" stroke-width="1"/>
    <line class="connection-muted" x1="150" y1="50" x2="100" y2="110" stroke="#1a2332" stroke-width="0.5"/>
    <line class="connection-muted" x1="150" y1="50" x2="200" y2="110" stroke="#1a2332" stroke-width="0.5"/>
    <text class="neon-green" x="50" y="65" font-family="monospace" font-size="10" text-anchor="middle">_C</text>
    <text class="neon-cyan" x="150" y="65" font-family="monospace" font-size="10" text-anchor="middle">_DEV</text>
    <text class="neon-green" x="250" y="65" font-family="monospace" font-size="10" text-anchor="middle">_JAVA</text>
  </g>

  <g transform="translate(640, 40)">
    <text class="base-font" x="0" y="0">// algorithm // optimization</text>
    <line class="connection-cyan" x1="0" y1="10" x2="100" y2="10"/>
    <circle class="pulse-node-green" cx="50" cy="40" r="3"/>
    <polygon points="40,30 60,30 60,50 40,50" fill="none" stroke="#1a3a20" stroke-width="0.5" transform="rotate(45, 50, 40)"/>
    <line class="connection-muted" x1="0" y1="10" x2="50" y2="40" stroke="#1a2332" stroke-width="0.5"/>
    <line class="connection-muted" x1="50" y1="40" x2="100" y2="70" stroke="#1a2332" stroke-width="0.5"/>
    <circle class="neon-green" cx="100" cy="70" r="2"/>
    <text class="muted-blue" x="110" y="73" style="font-size: 6px;">return (status == stable);</text>
  </g>
</svg>
