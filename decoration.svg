<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" width="800" height="200">
  <style>
    @keyframes scan-node {
      0%, 100% { stroke: #1a2332; stroke-width: 1; }
      50% { stroke: #2a9d5c; stroke-width: 2; filter: drop-shadow(0 0 3px #2a9d5c); }
    }
    @keyframes flow-line {
      to { stroke-dashoffset: -20; }
    }
    @keyframes blink-cursor {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .text-main { font-family: monospace; font-size: 10px; fill: #4a7a9b; }
    .node-label { font-family: monospace; font-size: 7px; fill: #2a4a3a; text-anchor: middle; }
    .node-circle { fill: #0d1a10; stroke: #1a3a20; stroke-width: 1; }
    .scanned { animation: scan-node 3s infinite; }
    .path-line { stroke: #1a2332; stroke-width: 1.5; fill: none; }
    .active-path { stroke: #1a9dbf; stroke-dasharray: 4 2; animation: flow-line 2s linear infinite; opacity: 0.6; }
    .cursor { animation: blink-cursor 1s infinite; fill: #2a9d5c; }
  </style>

  <rect width="800" height="200" fill="#0a0c0f" rx="6"/>

  <g transform="translate(30, 30)">
    <text class="text-main" x="0" y="0">&gt; ALGO.VISUALIZE(struct.tree)</text>
    <text class="text-main" x="0" y="15" style="opacity:0.4;">Status: BALANCED // Complexity: O(log n)</text>
    <rect class="cursor" x="185" y="-8" width="6" height="10"/>
  </g>

  <g transform="translate(400, 50)">
    <path class="path-line" d="M0 10 L-80 50 M0 10 L80 50"/>
    <path class="path-line" d="M-80 60 L-120 100 M-80 60 L-40 100"/>
    <path class="path-line" d="M80 60 L40 100 M80 60 L120 100"/>
    
    <path class="active-path" d="M0 10 L-80 50 L-120 100"/>

    <g transform="translate(0, 10)">
      <circle class="node-circle scanned" r="12"/>
      <text class="node-label" y="3">0x4F</text>
      <text class="text-main" x="20" y="0" style="font-size:8px;">[root]</text>
    </g>

    <g transform="translate(-80, 60)">
      <circle class="node-circle scanned" r="10" style="animation-delay: 0.5s;"/>
      <text class="node-label" y="3">0x2A</text>
    </g>
    <g transform="translate(80, 60)">
      <circle class="node-circle" r="10"/>
      <text class="node-label" y="3">0x7D</text>
    </g>

    <g transform="translate(-120, 110)">
      <circle class="node-circle scanned" r="8" style="animation-delay: 1s;"/>
      <text class="node-label" y="3" style="font-size:6px;">0x12</text>
    </g>
    <g transform="translate(-40, 110)">
      <circle class="node-circle" r="8"/>
      <text class="node-label" y="3" style="font-size:6px;">0x3B</text>
    </g>
    <g transform="translate(40, 110)">
      <circle class="node-circle" r="8"/>
      <text class="node-label" y="3" style="font-size:6px;">0x64</text>
    </g>
    <g transform="translate(120, 110)">
      <circle class="node-circle" r="8"/>
      <text class="node-label" y="3" style="font-size:6px;">0x9E</text>
      <text class="text-main" x="15" y="0" style="font-size:8px;">[leaf]</text>
    </g>
  </g>

  <g transform="translate(620, 140)">
    <text class="text-main" x="0" y="0" style="fill:#2a9d5c;">// logic.trace</text>
    <text class="text-main" x="0" y="12" style="font-size:7px;">L_CHILD: 0x2A</text>
    <text class="text-main" x="0" y="22" style="font-size:7px;">R_CHILD: 0x7D</text>
    <text class="text-main" x="0" y="32" style="font-size:7px;">DEPTH: 3</text>
  </g>
</svg>
