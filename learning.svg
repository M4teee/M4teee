    <circle cx="320" cy="76" r="5" fill="none" stroke="#1a9dbf" stroke-width="1.2" opacity="0.4"/>
    <line x1="320" y1="55" x2="304" y2="65" stroke="#1a9dbf" stroke-width="1" opacity="0.4"/>
    <line x1="320" y1="55" x2="336" y2="65" stroke="#1a9dbf" stroke-width="1" opacity="0.4"/>
    <line x1="305" y1="75" x2="315" y2="71" stroke="#1a9dbf" stroke-width="1" opacity="0.3"/>
    <line x1="335" y1="75" x2="325" y2="71" stroke="#1a9dbf" stroke-width="1" opacity="0.3"/>
    <text x="320" y="102" fill="#1a4a6a" font-size="9" font-family="monospace" text-anchor="middle">Redes</text>
