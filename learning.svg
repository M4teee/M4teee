    <line x1="558" y1="60" x2="566" y2="68" stroke="#1a9dbf" stroke-width="1" opacity="0.45"/>
    <circle cx="532" cy="72" r="3" fill="#1a9dbf" opacity="0.5"/>
    <circle cx="552" cy="56" r="3" fill="#1a9dbf" opacity="0.65"/>
