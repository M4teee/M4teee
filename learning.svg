<svg viewBox="0 0 680 128" xmlns="http://www.w3.org/2000/svg" width="680" height="128">
<style>
  @keyframes glitch-card {
    0%   { opacity: 0; transform: translateX(-4px); }
    5%   { opacity: 1; transform: translateX(3px); }
    8%   { opacity: 0.3; transform: translateX(-2px); }
    10%  { opacity: 1; transform: translateX(0); }
    92%  { opacity: 1; transform: translateX(0); }
    93%  { opacity: 0.4; transform: translateX(2px); }
    94%  { opacity: 1; transform: translateX(-1px); }
    95%  { opacity: 0.7; transform: translateX(0); }
    96%  { opacity: 1; transform: translateX(0); }
    100% { opacity: 1; transform: translateX(0); }
  }
  @keyframes glitch-text {
    0%,100% { opacity: 1; letter-spacing: 0.2em; }
    3%  { opacity: 0.2; letter-spacing: 0.4em; }
    6%  { opacity: 1; letter-spacing: 0.2em; }
    60% { opacity: 1; letter-spacing: 0.2em; }
    61% { opacity: 0.5; letter-spacing: 0.3em; }
    62% { opacity: 1; letter-spacing: 0.2em; }
  }
  @keyframes flicker-line {
    0%,100% { opacity: 1; }
    4%  { opacity: 0; }
    5%  { opacity: 1; }
    55% { opacity: 1; }
    56% { opacity: 0.3; }
    57% { opacity: 1; }
  }
  @keyframes boot-fill {
    0%   { width: 0px; opacity: 0.3; }
    15%  { width: 20px; opacity: 0.8; }
    18%  { width: 10px; opacity: 0.4; }
    22%  { width: 64px; opacity: 1; }
    85%  { width: 64px; opacity: 1; }
    87%  { width: 50px; opacity: 0.6; }
    89%  { width: 64px; opacity: 1; }
    100% { width: 64px; opacity: 1; }
  }
  @keyframes scanline {
    0%   { transform: translateY(0px); opacity: 0.06; }
    100% { transform: translateY(160px); opacity: 0.06; }
  }
  @keyframes border-glitch {
    0%,100% { opacity: 1; }
    7%  { opacity: 0; }
    8%  { opacity: 1; }
    70% { opacity: 1; }
    71% { opacity: 0.3; }
    72% { opacity: 1; }
  }
  .lc1 { animation: glitch-card 7s ease-out infinite 0.0s; }
  .lc2 { animation: glitch-card 7s ease-out infinite 0.2s; }
  .lc3 { animation: glitch-card 7s ease-out infinite 0.4s; }
  .lc4 { animation: glitch-card 7s ease-out infinite 0.6s; }
  .lc5 { animation: glitch-card 7s ease-out infinite 0.8s; }
  .hdr2 { animation: glitch-text 8s ease-out infinite 1s; }
  .ln   { animation: flicker-line 7s ease-out infinite; }
  .acc  { animation: border-glitch 6s ease-out infinite; }
  .scan { animation: scanline 3s linear infinite; }
  .bf1  { animation: boot-fill 7s ease-out infinite 0.0s; }
  .bf2  { animation: boot-fill 7s ease-out infinite 0.2s; }
  .bf3  { animation: boot-fill 7s ease-out infinite 0.4s; }
</style>

  <rect width="680" height="128" fill="#0a0c0f" rx="6"/>
  <rect class="scan" x="0" y="0" width="680" height="28" fill="#1a9dbf"/>
  <rect class="acc" x="0" y="0" width="2" height="128" fill="#1a6a8a" rx="1"/>
  
  <text class="hdr2" x="20" y="22" fill="#1a9dbf" font-size="9" font-family="monospace" letter-spacing="0.2em">&gt; LEARNING // path.devsecops</text>
  <line class="ln" x1="240" y1="18" x2="660" y2="18" stroke="#1a2332" stroke-width="1"/>

  <g class="lc1">
