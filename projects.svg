<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#0a0c0f" rx="6"/>
  
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .status { animation: pulse 2s infinite; }
    .label { font-family: monospace; font-size: 10px; fill: #4a7a9b; }
    .title { font-family: monospace; font-size: 14px; font-weight: bold; fill: #2a9d5c; }
    .desc { font-family: monospace; font-size: 10px; fill: #1a3a20; }
  </style>

  <g transform="translate(20, 30)">
    <rect width="360" height="110" fill="#0d1a10" rx="4" stroke="#1a3a20" stroke-width="1"/>
    <circle class="status" cx="15" cy="15" r="3" fill="#2a9d5c"/>
    <text x="30" y="20" class="label">WEB // main</text>
    <text x="15" y="50" class="title">pagina-educativa</text>
    <text x="15" y="75" class="desc">Proyecto final · curso de programación básica</text>
    <text x="310" y="100" class="label">HTML|CSS|JS</text>
  </g>

  <g transform="translate(20, 160)">
    <rect width="360" height="110" fill="#0a1520" rx="4" stroke="#1a2a3a" stroke-width="1"/>
    <circle class="status" cx="15" cy="15" r="3" fill="#1a9dbf"/>
    <text x="30" y="20" class="label" style="fill:#1a9dbf">TOOL // active</text>
    <text x="15" y="50" class="title" style="fill:#1a9dbf">plan-unlp</text>
    <text x="15" y="75" class="desc" style="fill:#0d2a3a">Plan de estudios interactivo · Ing. Computación UNLP</text>
    <text x="310" y="100" class="label">HTML|CSS|JS</text>
  </g>
</svg>
