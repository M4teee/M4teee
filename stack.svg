<svg viewBox="0 0 680 128" xmlns="http://www.w3.org/2000/svg" width="680" height="128">
  <style>
    @keyframes glitch-card {
      0%   { opacity: 0; transform: translateX(-4px); }
      5%   { opacity: 1; transform: translateX(3px); }
      8%   { opacity: 0.3; transform: translateX(-2px); }
      10%  { opacity: 1; transform: translateX(0); }
      92%  { opacity: 1; transform: translateX(0); }
      93%  { opacity: 0.4; transform: translateX(2px); }
      94%  { opacity: 1; transform: translateX(-1px); }
      95%  { opacity: 0.7; transform: translateX(0); }
      96%  { opacity: 1; transform: translateX(0); }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes glitch-text {
      0%,100% { opacity: 1; letter-spacing: 0.2em; }
      3%  { opacity: 0.2; letter-spacing: 0.4em; }
      6%  { opacity: 1; letter-spacing: 0.2em; }
      60% { opacity: 1; letter-spacing: 0.2em; }
      61% { opacity: 0.5; letter-spacing: 0.3em; }
      62% { opacity: 1; letter-spacing: 0.2em; }
    }
    @keyframes flicker-line {
      0%,100% { opacity: 1; }
      4%  { opacity: 0; }
      5%  { opacity: 1; }
      55% { opacity: 1; }
      56% { opacity: 0.3; }
      57% { opacity: 1; }
    }
    @keyframes scanline {
      0%   { transform: translateY(0px); opacity: 0.06; }
      100% { transform: translateY(160px); opacity: 0.06; }
    }
    @keyframes border-glitch {
      0%,100% { opacity: 1; }
      7%  { opacity: 0; }
      8%  { opacity: 1; }
      70% { opacity: 1; }
      71% { opacity: 0.3; }
      72% { opacity: 1; }
    }

    .c1 { animation: glitch-card 6s ease-out infinite 0.0s; }
    .c2 { animation: glitch-card 6s ease-out infinite 0.15s; }
    .c3 { animation: glitch-card 6s ease-out infinite 0.30s; }
    .c4 { animation: glitch-card 6s ease-out infinite 0.45s; }
    .c5 { animation: glitch-card 6s ease-out infinite 0.60s; }
    .c6 { animation: glitch-card 6s ease-out infinite 0.75s; }
    .c7 { animation: glitch-card 6s ease-out infinite 0.90s; }

    .hdr  { animation: glitch-text 8s ease-out infinite; }
    .ln   { animation: flicker-line 7s ease-out infinite; }
    .acc  { animation: border-glitch 6s ease-out infinite; }
    .scan { animation: scanline 3s linear infinite; }
  </style>

