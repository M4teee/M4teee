<svg viewBox="0 0 680 130" xmlns="http://www.w3.org/2000/svg" width="680" height="130">
  <style>
    @keyframes glitch-card { 0% { opacity: 0; transform: translateX(-4px); } 10% { opacity: 1; transform: translateX(0); } 100% { opacity: 1; transform: translateX(0); } }
    @keyframes glitch-text { 0%,100% { opacity: 1; letter-spacing: 0.2em; } 3% { opacity: 0.2; letter-spacing: 0.4em; } 6% { opacity: 1; letter-spacing: 0.2em; } }
    @keyframes scanline { 0% { transform: translateY(0px); opacity: 0.06; } 100% { transform: translateY(160px); opacity: 0.06; } }
    .c { animation: glitch-card 6s ease-out infinite; }
    .hdr { animation: glitch-text 8s ease-out infinite; }
    .scan { animation: scanline 3s linear infinite; }
  </style>

  <rect width="680" height="130" fill="#0a0c0f" rx="6"/>
  <rect class="scan" x="0" y="0" width="680" height="28" fill="#2a9d5c"/>
  <rect x="0" y="0" width="2" height="130" fill="#2a9d5c" rx="1"/>

  <text class="hdr" x="20" y="22" fill="#2a9d5c" font-size="9" font-family="monospace" letter-spacing="0.2em">&gt; STACK // sys.load</text>
  <line x1="160" y1="18" x2="660" y2="18" stroke="#1a2332" stroke-width="1"/>

  <g transform="translate(20, 32)" class="c" style="animation-delay:0s">
    <rect width="68" height="68" fill="#0d1a10" rx="3" stroke="#1a3a20" stroke-width="0.5"/>
    <text x="34" y="34" font-size="26" text-anchor="middle" font-family="monospace" fill="#4a7a9b" dominant-baseline="central">C</text>
    <text x="34" y="58" fill="#2a4a3a" font-size="9" font-family="monospace" text-anchor="middle">C</text>
  </g>

  <g transform="translate(96, 32)" class="c" style="animation-delay:0.1s">
    <rect width="68" height="68" fill="#0d1a10" rx="3" stroke="#1a3a20" stroke-width="0.5"/>
    <path d="M28 35 Q28 45 34 45 Q40 45 40 35 M40 37 Q45 37 45 40 Q45 43 40 43 M31 28 Q29 23 31 18 M35 28 Q33 23 35 18 M39 28 Q37 23 39 18" stroke="#4a7a9b" stroke-width="1.5" fill="none" transform="translate(0,-5)"/>
    <text x="34" y="58" fill="#2a4a3a" font-size="9" font-family="monospace" text-anchor="middle">Java</text>
  </g>

  <g transform="translate(172, 32)" class="c" style="animation-delay:0.2s">
    <rect width="68" height="68" fill="#0d1a10" rx="3" stroke="#1a3a20" stroke-width="0.5"/>
    <text x="34" y="34" font-size="18" text-anchor="middle" font-family="monospace" fill="#4a7a9b" dominant-baseline="central">JS</text>
    <text x="34" y="58" fill="#2a4a3a" font-size="9" font-family="monospace" text-anchor="middle">JavaScript</text>
  </g>

  <text x="20" y="120" fill="#1a3a20" font-size="9" font-family="monospace">// 8 modules loaded · status: stable</text>
</svg>
